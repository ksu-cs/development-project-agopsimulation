<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AGsim SVG</title>
<script src="https://unpkg.com/blockly/blockly.min.js"></script>
<style>
  html, body { height: 100%; margin: 0; font-family: sans-serif; }
  .container { display: flex; height: 100vh; }
  #blocklyDiv { flex: 1; min-width: 0; }
  #svgArea {
    width: 450px;
    background: #f0f0f0;
    border-left: 3px solid #ccc;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #gameSVG { border: 2px solid #333; background: #fff; width: 400px; height: 400px; }
  button { padding: 10px 20px; margin: 5px; font-size: 16px; border-radius: 5px; cursor: pointer; color: white; border: none; }
  #runButton { background: #4caf50; }
  #stopButton { background: #ff9800; }
  #resetButton { background: #f44336; }
  #debug { background: white; padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; font-family: monospace; font-size: 12px; margin-top: 10px; }
  .tractor-div { width: 40px; height: 40px; display: block; background-repeat: no-repeat; background-position: 0 0; background-size: 160px 40px; image-rendering: -webkit-optimize-contrast; }
</style>
</head>
<body>
<div class="container">
  <div id="blocklyDiv"></div>
  <div id="svgArea">
    <p id="scoreText">Yield: 0</p>
    <svg id="gameSVG" viewBox="0 0 400 400"></svg>


<p>GDD today? <span id="gdd">Loading...</span></p>

<script type="module">
import weatherData, { calculateGDD, isGDD } from '/src/assets/weather.js';

const gddEl = document.getElementById('gdd');

try {
  const gddValue = calculateGDD(weatherData, 10);
  const gddFlag = isGDD(weatherData, 10);

  gddEl.textContent = `GDD: ${gddValue.toFixed(3)} (${gddFlag})`;
} catch (err) {
  console.error("Error computing GDD:", err);
  gddEl.textContent = "Error";
}

</script>



	  
    <button id="runButton">Run Code</button>
    <button id="stopButton">Stop</button>
    <button id="resetButton">Reset</button>
    <div id="debug">Drag blocks to workspace, then click Run</div>
  </div>
</div>

<script>
  // --- Blockly Blocks ---
  Blockly.defineBlocksWithJsonArray([
    { "type": "move_forward", "message0": "move forward %1 seconds",
      "args0":[{"type":"input_value","name":"DURATION","check":"Number"}],
      "previousStatement":null,"nextStatement":null,"colour":160 },
    { "type": "turn_left", "message0":"turn left", "previousStatement":null,"nextStatement":null,"colour":210 },
    { "type": "turn_right", "message0":"turn right","previousStatement":null,"nextStatement":null,"colour":210 },
    { "type": "turn_left_x_degrees","message0":"turn %1 degrees left","args0":[{"type":"input_value","name":"DEGREES","check":"Number"}],"previousStatement":null,"nextStatement":null,"colour":210 },
    { "type": "turn_right_x_degrees","message0":"turn %1 degrees right","args0":[{"type":"input_value","name":"DEGREES","check":"Number"}],"previousStatement":null,"nextStatement":null,"colour":210 },
    { "type": "math_number","message0":"%1","args0":[{"type":"field_number","name":"NUM","value":1}],"output":"Number","colour":230 },
    { "type": "turn_on_tractor","message0":"turn on tractor","previousStatement":null,"nextStatement":null,"colour":210 },
    { "type": "turn_off_tractor","message0":"turn off tractor","previousStatement":null,"nextStatement":null,"colour":210 }
  ]);

  Blockly.JavaScript.forBlock['move_forward'] = b => 
    `await moveForward(${Blockly.JavaScript.valueToCode(b,'DURATION',Blockly.JavaScript.ORDER_ATOMIC)||'1'});\n`;
  Blockly.JavaScript.forBlock['turn_left'] = b => 'turnLeft();\n';
  Blockly.JavaScript.forBlock['turn_right'] = b => 'turnRight();\n';
  Blockly.JavaScript.forBlock['turn_left_x_degrees'] = b => 
    `turnLeftX(${Blockly.JavaScript.valueToCode(b,'DEGREES',Blockly.JavaScript.ORDER_ATOMIC)||'90'});\n`;
  Blockly.JavaScript.forBlock['turn_right_x_degrees'] = b => 
    `turnRightX(${Blockly.JavaScript.valueToCode(b,'DEGREES',Blockly.JavaScript.ORDER_ATOMIC)||'90'});\n`;
  Blockly.JavaScript.forBlock['turn_on_tractor'] = b => 'turnOnTractor();\n';
  Blockly.JavaScript.forBlock['turn_off_tractor'] = b => 'turnOffTractor();\n';
  Blockly.JavaScript.forBlock['math_number'] = b => [b.getFieldValue('NUM'), Blockly.JavaScript.ORDER_ATOMIC];

  // --- Toolbox ---
  const toolbox = {
    kind: "categoryToolbox",
    contents: [
      { kind:"category", name:"Movement", colour:"#5b67a5",
        contents:[
          {kind:"block", type:"move_forward"},
          {kind:"block", type:"turn_left"},
          {kind:"block", type:"turn_right"},
          {kind:"block", type:"turn_left_x_degrees"},
          {kind:"block", type:"turn_right_x_degrees"},
          {kind:"block", type:"turn_on_tractor"},
          {kind:"block", type:"turn_off_tractor"}
        ]
      },
      { kind:"category", name:"Numbers", colour:"#5b9aa5",
        contents:[
          {kind:"block", type:"math_number"},
          {kind:"block", type:"math_random_int"},
          {kind:"block", type:"math_arithmetic"}
        ]
      },
      { kind:"category", name:"Logic", colour:"#5b9dd5",
        contents:[
          {kind:"block", type:"logic_boolean"},
          {kind:"block", type:"logic_compare"},
          {kind:"block", type:"logic_operation"},
          {kind:"block", type:"logic_negate"},
          {kind:"block", type:"logic_null"}
        ]
      },
      { kind:"category", name:"Loops", colour:"#5a1dd5",
        contents:[
          {kind:"block", type:"controls_repeat_ext"},
          {kind:"block", type:"controls_whileUntil"},
          {kind:"block", type:"controls_for"},
          {kind:"block", type:"controls_forEach"}
        ]
      },
      { kind:"category", name:"Control", colour:"#5b12a5",
        contents:[
          {kind:"block", type:"controls_if"},
          {kind:"block", type:"controls_ifelse"},
          {kind:"block", type:"controls_flow_statements"}
        ]
      }
    ]
  };

  const workspace = Blockly.inject('blocklyDiv',{toolbox:toolbox,trashcan:true});

  // --- SVG Field ---
  const svg = document.getElementById('gameSVG');
  const fieldRows = 10, fieldCols = 10;
  const tileSize = 40;
  let field = Array.from({length:fieldRows},()=>new Array(fieldCols).fill(1));
  let tractor = {x:9, y:0, angle:180, isOn:false, yield:0};
  let isMoving=false;
  let stopRequested = false;

  const wheatImg = './src/assets/T2D_Planted_Placeholder.png';
  const dirtImg = './src/assets/T2D_Dirt_Placeholder.png';
  const tractorImg = './src/assets/tractor-spritesheet.png';

  const svgTiles = [];
  for(let r=0;r<fieldRows;r++){
    svgTiles[r]=[];
    for(let c=0;c<fieldCols;c++){
      const img=document.createElementNS("http://www.w3.org/2000/svg","image");
      img.setAttribute("x",c*tileSize);
      img.setAttribute("y",r*tileSize);
      img.setAttribute("width",tileSize);
      img.setAttribute("height",tileSize);
      img.setAttribute("href",field[r][c]?wheatImg:dirtImg);
      svg.appendChild(img);
      svgTiles[r][c]=img;
    }
  }

  // --- Tractor ---
  const fo = document.createElementNS("http://www.w3.org/2000/svg","foreignObject");
  fo.setAttribute("width", tileSize);
  fo.setAttribute("height", tileSize);
  const innerDiv = document.createElement("div");
  innerDiv.setAttribute("xmlns","http://www.w3.org/1999/xhtml");
  innerDiv.className="tractor-div";
  innerDiv.style.backgroundImage = `url("${tractorImg}")`;
  innerDiv.style.width=`${tileSize}px`;
  innerDiv.style.height=`${tileSize}px`;
  innerDiv.style.backgroundSize=`${4*tileSize}px ${tileSize}px`;
  fo.appendChild(innerDiv);
  svg.appendChild(fo);

function getFrameIndex(angle){
  const a = ((angle%360)+360)%360;
  if(a === 0) return 0; // right
  if(a === 90) return 3; // up
  if(a === 180) return 2; // left
  if(a === 270) return 1; // down
  if(a < 45 || a >= 315) return 2;
  if(a < 135) return 1;
  if(a < 225) return 0;
  return 3;
}


  function updateTractorVisual(){

    fo.setAttribute("x",tractor.x*tileSize);
    fo.setAttribute("y",tractor.y*tileSize);
    const idx = getFrameIndex(tractor.angle);
    innerDiv.style.backgroundPosition=`${-idx*tileSize}px 0px`;
  }

  function drawField(){
    for(let r=0;r<fieldRows;r++){
      for(let c=0;c<fieldCols;c++){
        svgTiles[r][c].setAttribute("href",field[r][c]?wheatImg:dirtImg);
      }
    }
    updateTractorVisual();
    document.getElementById('scoreText').innerText=`Yield: ${tractor.yield}`;
    document.getElementById('debug').innerHTML=`Tractor: (${tractor.x},${tractor.y})<br>Angle: ${tractor.angle}°<br>Moving: ${isMoving?'Yes':'No'}`;
  }

  function turnOnTractor(){tractor.isOn=true;}
  function turnOffTractor(){tractor.isOn=false;}
  function turnLeft(){if(!stopRequested){tractor.angle-=90; drawField();}}
  function turnRight(){if(!stopRequested){tractor.angle+=90; drawField();}}
  function turnLeftX(deg){tractor.angle-=deg; drawField();}
  function turnRightX(deg){tractor.angle+=deg; drawField();}
  function resetPosition(){tractor={x:9,y:0,angle:180,isOn:false,yield:0}; field=Array.from({length:fieldRows},()=>new Array(fieldCols).fill(1)); drawField();}
  function stopMovement(){isMoving=false; stopRequested = true;}

function moveForward(seconds) {
    return new Promise(resolve => {
        const startTime = performance.now();
        const durationMs = seconds*1000;
        const pixelsPerSecond = 40
        isMoving = true;

        function animate(now) {
            if (stopRequested || !isMoving) return resolve();
            const elapsed = now - startTime;
            if (elapsed >= durationMs) return resolve();
            const delta = (pixelsPerSecond / 1000) * (now - (animate.lastTime || now));
            animate.lastTime = now;

            const rad = tractor.angle*Math.PI/180;
            const speed = tileSize / 0.5; // adjust for smooth speed
            tractor.x += Math.cos(rad) * (delta / tileSize);
            tractor.y -= Math.sin(rad) * (delta / tileSize);

            updateTractorVisual();
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    });
}


  drawField();
document.getElementById('runButton').addEventListener('click', async function() {
		const runButton = document.getElementById('runButton');
    		        stopRequested = false;
		runButton.disabled = true;

            isMoving = true;

            const allBlocks = workspace.getAllBlocks(false);
            
            if (allBlocks.length > 0) {
                const code = Blockly.JavaScript.workspaceToCode(workspace);
                
                if (code.trim()) {
                    try {
                        // Wrap the code in an async function and execute
                        const asyncCode = `(async function() { ${code} })()`;
                        await eval(asyncCode);
                    } catch (e) {
                        console.error('ERROR:', e);
                    }
                }
            }
            isMoving = false;
			runButton.disabled = false;
        });

        // Stop button
        document.getElementById('stopButton').addEventListener('click', function() {
            stopMovement();
			runButton.disabled = false;
        });

        // Reset button
        document.getElementById('resetButton').addEventListener('click', function() {
            stopMovement();
            resetPosition();
            stopRequested = false;
            isMoving = false;
			      runButton.disabled = false;
        });
</script>
</body>
</html>
