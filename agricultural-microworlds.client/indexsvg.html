<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AGsim SVG</title>
<script src="https://unpkg.com/blockly/blockly.min.js"></script>
<style>
  html, body { height: 100%; margin: 0; font-family: sans-serif; }
  .container { display: flex; height: 100vh; }
  #blocklyDiv { flex: 1; min-width: 0; }
  #svgArea {
    width: 450px;
    background: #f0f0f0;
    border-left: 3px solid #ccc;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #gameSVG { border: 2px solid #333; background: #fff; width: 400px; height: 400px; }
  button { padding: 10px 20px; margin: 5px; font-size: 16px; border-radius: 5px; cursor: pointer; color: white; border: none; }
  #runButton { background: #4caf50; }
  #stopButton { background: #ff9800; }
  #resetButton { background: #f44336; }
  #debug { background: white; padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; font-family: monospace; font-size: 12px; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
  <div id="blocklyDiv"></div>
  <div id="svgArea">
    <p id="scoreText">Yield: 0</p>
    <svg id="gameSVG" viewBox="0 0 400 400"></svg>
    <button id="runButton">Run Code</button>
    <button id="stopButton">Stop</button>
    <button id="resetButton">Reset</button>
    <div id="debug">Drag blocks to workspace, then click Run</div>
  </div>
</div>

<script>
  // --- Blockly Blocks ---
  Blockly.defineBlocksWithJsonArray([
    { "type": "move_forward", "message0": "move forward %1 seconds",
      "args0":[{"type":"input_value","name":"DURATION","check":"Number"}],
      "previousStatement":null,"nextStatement":null,"colour":160 },
    { "type": "turn_left", "message0":"turn left", "previousStatement":null,"nextStatement":null,"colour":210 },
    { "type": "turn_right", "message0":"turn right","previousStatement":null,"nextStatement":null,"colour":210 },
    { "type": "math_number","message0":"%1","args0":[{"type":"field_number","name":"NUM","value":1}],"output":"Number","colour":230 },
    { "type": "turn_on_tractor","message0":"turn on tractor","previousStatement":null,"nextStatement":null,"colour":210 },
    { "type": "turn_off_tractor","message0":"turn off tractor","previousStatement":null,"nextStatement":null,"colour":210 }
  ]);

  Blockly.JavaScript.forBlock['move_forward'] = b => `await moveForward(${Blockly.JavaScript.valueToCode(b,'DURATION',Blockly.JavaScript.ORDER_ATOMIC)||'1'});\n`;
  Blockly.JavaScript.forBlock['turn_left'] = b => 'turnLeft();\n';
  Blockly.JavaScript.forBlock['turn_right'] = b => 'turnRight();\n';
  Blockly.JavaScript.forBlock['turn_on_tractor'] = b => 'turnOnTractor();\n';
  Blockly.JavaScript.forBlock['turn_off_tractor'] = b => 'turnOffTractor();\n';
  Blockly.JavaScript.forBlock['math_number'] = b => [b.getFieldValue('NUM'), Blockly.JavaScript.ORDER_ATOMIC];

  const toolbox = {
    kind:"categoryToolbox", contents:[
      {kind:"category",name:"Movement",colour:"#5b67a5",contents:[
        {kind:"block",type:"move_forward"},
        {kind:"block",type:"turn_left"},
        {kind:"block",type:"turn_right"},
        {kind:"block",type:"turn_on_tractor"},
        {kind:"block",type:"turn_off_tractor"}
      ]},
      {kind:"category",name:"Numbers",colour:"#5b9aa5",contents:[
        {kind:"block",type:"math_number"}
      ]}
    ]
  };

  const workspace = Blockly.inject('blocklyDiv',{toolbox:toolbox,trashcan:true});

  // --- SVG Field ---
  const svg = document.getElementById('gameSVG');
  const fieldRows = 10, fieldCols = 10;
  const tileSize = 40;
  let field = Array.from({length:fieldRows},()=>new Array(fieldCols).fill(1));
  let tractor = {x:5, y:5, angle:180, isOn:false, yield:0};
  let isMoving=false;

  // --- Images ---
  const wheatImg = './src/assets/T2D_Planted_Placeholder.png';
  const dirtImg = './src/assets/T2D_Dirt_Placeholder.png';
  const tractorImg = './src/assets/tractor-spritesheet.png'; // <-- PNG tractor

  // --- Pre-create tile images ---
  const svgTiles = [];
  for(let r=0;r<fieldRows;r++){
    svgTiles[r]=[];
    for(let c=0;c<fieldCols;c++){
      const img=document.createElementNS("http://www.w3.org/2000/svg","image");
      img.setAttribute("x",c*tileSize);
      img.setAttribute("y",r*tileSize);
      img.setAttribute("width",tileSize);
      img.setAttribute("height",tileSize);
      img.setAttribute("href",field[r][c]?wheatImg:dirtImg);
      svg.appendChild(img);
      svgTiles[r][c]=img;
    }
  }

  // --- Tractor image ---
  const tractorSVG = document.createElementNS("http://www.w3.org/2000/svg","image");
  tractorSVG.setAttribute("href",tractorImg);
  tractorSVG.setAttribute("width",tileSize);
  tractorSVG.setAttribute("height",tileSize);
  svg.appendChild(tractorSVG);

  // --- Drawing function ---
  function drawField(){
    for(let r=0;r<fieldRows;r++){
      for(let c=0;c<fieldCols;c++){
        svgTiles[r][c].setAttribute("href",field[r][c]?wheatImg:dirtImg);
      }
    }
    tractorSVG.setAttribute("x",tractor.x*tileSize);
    tractorSVG.setAttribute("y",tractor.y*tileSize);
    tractorSVG.setAttribute("transform",`rotate(${tractor.angle},${tractor.x*tileSize+tileSize/2},${tractor.y*tileSize+tileSize/2})`);

    document.getElementById('scoreText').innerText=`Yield: ${tractor.yield}`;
    document.getElementById('debug').innerHTML=
      `Tractor: (${tractor.x},${tractor.y})<br>Angle: ${tractor.angle}°<br>Moving: ${isMoving?'Yes':'No'}`;
  }

  // --- Movement functions ---
  function turnOnTractor(){tractor.isOn=true;}
  function turnOffTractor(){tractor.isOn=false;}
  function turnLeft(){tractor.angle-=90; drawField();}
  function turnRight(){tractor.angle+=90; drawField();}
  function resetPosition(){tractor={x:5,y:5,angle:180,isOn:false,yield:0}; field=Array.from({length:fieldRows},()=>new Array(fieldCols).fill(1)); drawField();}
  function stopMovement(){isMoving=false;}

  function moveForward(seconds){
    return new Promise(resolve=>{
      isMoving=true;
      let steps = seconds*10;
      let stepCount=0;
      function step(){
        if(stepCount>=steps || !isMoving){resolve(); return;}
        const rad = tractor.angle*Math.PI/180;
        let dx = Math.round(Math.cos(rad));
        let dy = Math.round(Math.sin(rad));
        tractor.x = Math.max(0,Math.min(fieldCols-1,tractor.x+dx));
        tractor.y = Math.max(0,Math.min(fieldRows-1,tractor.y+dy));
        if(tractor.isOn && field[tractor.y][tractor.x]==1){field[tractor.y][tractor.x]=0; tractor.yield++;}
        drawField();
        stepCount++;
        setTimeout(step,100);
      }
      step();
    });
  }

  drawField();

  // --- Buttons ---
  document.getElementById('runButton').addEventListener('click',async()=>{
    document.getElementById('runButton').disabled=true;
    const code = Blockly.JavaScript.workspaceToCode(workspace);
    if(code.trim()) try{ await eval(`(async()=>{${code}})()`); } catch(e){console.error(e);}
    document.getElementById('runButton').disabled=false;
  });

  document.getElementById('stopButton').addEventListener('click',()=>{
    stopMovement();
    document.getElementById('runButton').disabled=false;
  });

  document.getElementById('resetButton').addEventListener('click',()=>{
    stopMovement();
    resetPosition();
    document.getElementById('runButton').disabled=false;
  });
</script>
</body>
</html>
