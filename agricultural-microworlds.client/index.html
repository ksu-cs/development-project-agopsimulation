<script>
async function loadStations() {
    const response = await fetch('https://mesonet.k-state.edu/rest/stationnames/');
    const text = await response.text();
    const lines = text.split('\n').slice(1); // skip header
    const stationSelect = document.getElementById('station');
    stationSelect.innerHTML = ''; // clear loading option

    lines.forEach(line => {
        const cols = line.split(',');
        const NAME = cols[0];
        const ABBR = cols[0];
        if (NAME && ABBR) {
            const option = document.createElement('option');
            option.value = ABBR;      // for URL
            option.textContent = NAME; // for user display
            stationSelect.appendChild(option);
        }
    });
}

async function fetchData() {
    const station = document.getElementById('station').value;

    const response = await fetch(url);
    const data = await response.text();

}
loadStations();

        // Toolbox definition
        const toolbox = {

        // Inject Blockly
        const workspace = Blockly.inject('blocklyDiv', {

        // Canvas and movement code
        const canvas = document.getElementById('gameCanvas');

        // Global variables

        // Tractor variables
        let tractorWorldX = canvas.width / 2; // Tractor's vertical position in the entire world
        let tractorWorldY = canvas.height / 2; // Tractor's horizontal position in the entire world

        let angle = 0; // 0 degrees = facing right
    	let goalAngle = 0; // Our angle will be set to move towards this.
    	let turnSpeed = 90; //How fast the tractor can turn.
        let weeksToWait = 0;
        let nightFadeProgress = -1.0; // The progress for the night transition animation. Ranges from 0-1 when active.
        let isMoving = false; // flag to indicate if the tractor is currently moving
        let isHarvestingOn = false; // flag to indicate if harvesting mode is on

        let animationId = -1; // ID for the animation frame
        let yieldScore = 0; // score for harvested crops

        // Camera Variables
        // const tractorScreenX = canvas.width / 2; // Tractor's vertical position on the screen
        // const tractorScreenY = canvas.height / 2; // Tractor's horizontal position on the screen
        // let cameraX = tractorWorldX - tractorScreenX; // Top-left corner of the camera in world coordinates
        // let cameraY = tractorWorldY - tractorScreenY; // Top-left corner of the camera in world coordinates
        let cameraX = 0; // 
        let cameraY = 0;

        // Game asset constants
        const FRAME_WIDTH = 64;  // change to sprite’s frame width
        const FRAME_HEIGHT = 64; // change to sprite’s frame height
        const TILE_BASE_SIZE = 64; // The original size of the field tiles
        const FIELD_SCALE = 8; // The amount the field tiles will be scaled down by
        const SPEED = 20; // pixels per second

        // Time variables
        const START_WEEK = 1; // starting week
        const GROWTH_DAYS = 100.0; // weeks for crops to fully grow
        let currentWeek = START_WEEK; // current week in simulation
        // let weeksPassedSincePlanting = 0; // weeks passed since last planting

        // Field variables
        const TILE_WIDTH = TILE_BASE_SIZE / FIELD_SCALE; // Scaled width of each tile
        const TILE_HEIGHT = TILE_BASE_SIZE / FIELD_SCALE; // Scaled height of each tile

        // Setting up the array that represents the field
        const WORLD_WIDTH_IN_SCREENS = 5; // Number of screens wide the world is
        const WORLD_HEIGHT_IN_SCREENS = 5; // Number of screens high the world is
        const SCREEN_ROWS = Math.floor(canvas.height / TILE_HEIGHT) + 2; // +2 to cover edges
        const SCREEN_COLUMNS = Math.floor(canvas.width / TILE_WIDTH) + 2; // +2 to cover edges

        const rows = SCREEN_ROWS * WORLD_HEIGHT_IN_SCREENS; // Total number of rows in the world
        const columns = SCREEN_COLUMNS * WORLD_WIDTH_IN_SCREENS; // Total number of columns in the world

        // World field dimensions
        const worldPixelWidth = columns * TILE_WIDTH; // Total width of the world in pixels
        const worldPixelHeight = rows * TILE_HEIGHT; // Total height of the world in pixels

        let field = []; // 2D array representing the field tiles

        // --- Sprite setup ---

        const wheatImage = new Image();
        const seedImage = new Image();

        wheatImage.src = "./src/assets/wheat.png";

                console.log(`Initalizing world: ${columns}x${rows} tiles`);

        // Methods for Harvesting and Seeding Blocks
        function turnHarvestingOn() {
            isHarvestingOn = true;
            isSeedingOn = false;
        }
        function turnHarvestingOff() {
            isHarvestingOn = false;

            isSeedingOn = true;
            isHarvestingOn = false;

        }

        // Method for Wait X Weeks Block
        function waitXWeeks(weeks) {
        	return new Promise((resolve) => {
                let weeksToProcess = weeks;

                if (weeksToProcess > 0) {
           	        nightFadeProgress = 0.0;
                }
                else{
                    resolve();
                    return;
                }

                let waitingTime = 0.2;

            	function UpdateNight() {
                    const delta = 1 / 60; // assuming 60fps
                    
                    if (nightFadeProgress > 0.5 && waitingTime > 0)
                    {
                        // Wait for a period determined by the weeks set.
                        waitingTime -= delta;
                        if (waitingTime <= 0)
                        {
                            // Notify that a week has passed, and handle accordingly.
                            currentWeek++;
                            growCrops(1);

                            document.getElementById('weekText').innerHTML = `Week ${currentWeek}`;

                            // console.log("Current Week:" + currentWeek);

                            weeksToProcess--;
                            if (weeksToProcess > 0)
                                waitingTime = 0.2;
                        }
                    }
                    else
                    {
                        let fadeSpeed = (waitingTime > 0) ? 1.0 : 2.0;
                        nightFadeProgress = Math.min(nightFadeProgress + (delta * fadeSpeed), 1.0);
                    }
                	if (weeksToProcess > 0 || nightFadeProgress < 1.0) {
                    	drawFieldAndTractor();
                    	animationId = requestAnimationFrame(UpdateNight);
                	} else {
                        nightFadeProgress = -1;
                        drawFieldAndTractor();
                        resolve();
                	}
            	}

            	UpdateNight();
        	});
            currentWeek += weeks;
            growCrops(weeks);   
            document.getElementById('weekText').innerHTML = `Week ${currentWeek}`;
        }

        function CheckIfPlantInFront() {
            const topLeft = { x: -FRAME_WIDTH / 2, y: -FRAME_HEIGHT / 2 };
            const topRight = { x: FRAME_WIDTH / 2, y: -FRAME_HEIGHT / 2 };
            const bottomRight = { x: FRAME_WIDTH / 2, y: FRAME_HEIGHT / 2 };
            const bottomLeft = { x: -FRAME_WIDTH / 2, y: FRAME_HEIGHT / 2 };
            const center = { x: tractorWorldX + (FRAME_WIDTH / 2), y: tractorWorldY + (FRAME_HEIGHT / 2) };

            const corners = [
                rotatePoint(topLeft.x, topLeft.y, angle, center.x, center.y), //topLeft
                rotatePoint(topRight.x, topRight.y, angle, center.x, center.y), //topRight
                rotatePoint(bottomRight.x, bottomRight.y, angle, center.x, center.y), // bottomRight
                rotatePoint(bottomLeft.x, bottomLeft.y, angle, center.x, center.y), // bottomLeft
            ];

            const frontSide = [corners[1], corners[2]]; // right side of image when angle = 0
            return detectWhatTilesAreHit(frontSide[0].x, frontSide[0].y, frontSide[1].x, frontSide[1].y, 2);
        }

        function growCrops(weeks) {
            const daysToAdd = weeks * 7.0;

            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < columns; j++) {
                    let tile = field[i][j];
                    if (tile.state === 1) { // Seeded
                        tile.growth += daysToAdd;
                        if (tile.growth >= GROWTH_DAYS) {
                            tile.state = 2; // Fully grown
                            tile.growth = GROWTH_DAYS;
                        }
                    }
                }
            }
            drawFieldAndTractor();
        }

        // --- Draw the tractor sprite based on current direction ---
        function drawTractor() {
            const screenX = tractorWorldX - cameraX;
            const screenY = tractorWorldY - cameraY;

            const normalizedAngle = ((angle % 360) + 360) % 360;
            var angleInRadians = normalizedAngle * Math.PI / 180;

            // tractorsprite
            ctx.save();
            ctx.translate(screenX + FRAME_WIDTH / 2, screenY + FRAME_HEIGHT / 2);
            ctx.rotate(angleInRadians);
            ctx.drawImage(tractorSprite, -FRAME_WIDTH / 2, -FRAME_HEIGHT / 2);
            ctx.restore();

            document.getElementById('debug').innerHTML = //debugging window
                `World Position: (${Math.round(tractorWorldX)}, ${Math.round(tractorWorldY)})<br>` +
                `Camera Position: (${Math.round(cameraX)}, ${Math.round(cameraY)})<br>` +
                `Screen Position: (${Math.round(screenX)}, ${Math.round(screenY)})<br>` +
                `Angle: ${normalizedAngle}°<br>` +
                `Direction: ${getDirectionName(angle)}<br>` +
                `Moving: ${isMoving ? 'Yes' : 'No'} <br>`;
        }


        // Draws the field onto the canvas
        function drawField() {
            const topLeft = { x: -FRAME_WIDTH / 2, y: -FRAME_HEIGHT / 2 };
            const topRight = { x: FRAME_WIDTH / 2, y: -FRAME_HEIGHT / 2 };
            const bottomRight = { x: FRAME_WIDTH / 2, y: FRAME_HEIGHT / 2 };
            const bottomLeft = { x: -FRAME_WIDTH / 2, y: FRAME_HEIGHT / 2 };
            const center = { x: tractorWorldX + (FRAME_WIDTH / 2), y: tractorWorldY + (FRAME_HEIGHT / 2) };

            const corners = [
                rotatePoint(topLeft.x, topLeft.y, angle, center.x, center.y), //topLeft
                rotatePoint(topRight.x, topRight.y, angle, center.x, center.y), //topRight
                rotatePoint(bottomRight.x, bottomRight.y, angle, center.x, center.y), // bottomRight
                rotatePoint(bottomLeft.x, bottomLeft.y, angle, center.x, center.y), // bottomLeft
            ];

            const frontSide = [corners[1], corners[2]]; // right side of image when angle = 0

            detectWhatTilesAreHit(frontSide[0].x, frontSide[0].y, frontSide[1].x, frontSide[1].y, -1);

            // draw the entire field using camera coordinates

            const startCol = Math.floor(cameraX / TILE_WIDTH);
            const endCol = Math.min(columns, startCol + SCREEN_COLUMNS);
            const startRow = Math.floor(cameraY / TILE_HEIGHT);
            const endRow = Math.min(rows, startRow + SCREEN_ROWS);
            
            for (let i = startRow; i < endRow; i++) {
                for (let j = startCol; j < endCol; j++) {
                    if (i < 0 || j < 0) continue; // skip negative indices

                    let dirtOrWheat = dirtImage;
                    switch (field[i][j].state) {
                        case 0:
                            dirtOrWheat = dirtImage;
                            break;
                        case 1:
                            dirtOrWheat = seedImage;
                            break;
                        case 2:
                            dirtOrWheat = wheatImage;
                            break;
                    }
                    const tileWorldX = j * TILE_WIDTH;
                    const tileWorldY = i * TILE_HEIGHT;

                    const tileScreenX = tileWorldX - cameraX;
                    const tileScreenY = tileWorldY - cameraY;

                    ctx.drawImage(dirtOrWheat, 0, 0, TILE_BASE_SIZE, TILE_BASE_SIZE,
                        Math.floor(tileScreenX),
                        Math.floor(tileScreenY),
                        TILE_WIDTH,
                        TILE_HEIGHT);
                }
            }
        }

        function DrawNight() {
            let alpha = 0.75*Math.min(1.2*Math.sin(nightFadeProgress * Math.PI), 1.0);
            ctx.fillStyle = `rgba(15, 15, 75, ${alpha})`; // Set fill color to a transparent blue
            ctx.fillRect(0, 0, canvas.width, canvas.height); // Draw the overlay
        }

        // Detects and changes which tiles are in the line from point0, to point1 for a gentle slope
        function detectGentleSlope(x0, y0, x1, y1, checkTiles = -1) {
            let deltaX = x1 - x0;
            let deltaY = y1 - y0;

            let yi = 1;

            if (deltaY < 0) {
                yi = -1;
                deltaY = -deltaY;
            }
            let D = (2 * deltaY) - deltaX;
            let y = y0;
            let hasChecked = false;

            for (let x = x0; x < x1; x++) {
                const tileX = Math.floor(x / TILE_WIDTH);
                const tileY = Math.floor(y / TILE_HEIGHT);
                if (checkTiles < 0)
                    changeTile(tileX, tileY);
                if (D > 0) {
                    y = y + yi;
                    D = D + (2 * (deltaY - deltaX));
                }
                else D = D + 2 * deltaY;

                hasChecked = hasChecked || checkTiles < 0 || (tileX >= 0 && tileX < columns && tileY >= 0 && tileY < rows && field[tileX, tileY].state == checkTiles);
            }

            return hasChecked;
        }

        // Detects and changes which tiles are in the line from point0, to point1 for a steep slope
        function detectSteepSlope(x0, y0, x1, y1, checkTiles = -1) {
            let deltaX = x1 - x0;
            let deltaY = y1 - y0;

            let xi = 1;

            if (deltaX < 0) {
                xi = -1;
                deltaX = -deltaX;
            }
            let D = (2 * deltaX) - deltaY;
            let x = x0;
            let hasChecked = false;

            for (let y = y0; y < y1; y++) {
                const tileX = Math.floor(x / TILE_WIDTH);
                const tileY = Math.floor(y / TILE_HEIGHT);
                if (checkTiles < 0)
                    changeTile(tileX, tileY);
                if (D > 0) {
                    x = x + xi;
                    D = D + (2 * (deltaX - deltaY));
                }
                else D = D + 2 * deltaX;

                hasChecked = hasChecked || checkTiles < 0 || (tileX >= 0 && tileX < columns && tileY >= 0 && tileY < rows && field[tileX, tileY].state == checkTiles);
            }

            return hasChecked;
        }

        // Changes the tile at field[y][x] to the apropriate value based on the current mode of the vehicle
        function changeTile(x, y) {
            if (x >= 0 && x < columns && y >= 0 && y < rows) {
                let tile = field[y][x];

                if (isHarvestingOn) {
                    if (tile.state === 2) {
                        tile.state = 0;
                        tile.growth = 0.0;
                        yieldScore++;
                    }
                    else if (tile.state === 1) {
                        tile.state = 0;
                        tile.growth = 0.0;
                    }
                }
                else if (isSeedingOn) {
                    if (tile.state === 0) {
                        tile.state = 1;
                        tile.growth = 0.0;
                        yieldScore++;
                    }
                }
            }
        }

        // Detects wether the slope from point0 to point1 is steep or gentle then calls the appropriate method to detect tiles in that line
        function detectWhatTilesAreHit(x0, y0, x1, y1, checkTiles = -1) {
            if (Math.abs(y1 - y0) < Math.abs(x1 - x0)) {
                if (x0 > x1) return detectGentleSlope(x1, y1, x0, y0, checkTiles);
                else return detectGentleSlope(x0, y0, x1, y1, checkTiles);
            }
            else {
                if (y0 > y1) return detectSteepSlope(x1, y1, x0, y0, checkTiles);
                else return detectSteepSlope(x0, y0, x1, y1, checkTiles);
            }
        }

        // Resets the field to be the value of the Wheat tile
        function resetField() {
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < columns; j++) {
                    field[i][j] = { state: 2, growth: 0.0};
                }
            }
        }

        // Rotates x and y coordinates to a new location based on the an angle and the center of rotation
        function rotatePoint(x0, y0, angle, centerX, centerY) {
            const angleInRadians = angle * (Math.PI / 180);
            const cos = Math.cos(angleInRadians);
            const sin = Math.sin(angleInRadians);
            var newX = centerX + ((x0 * cos) - (y0 * sin));
            var newY = centerY + ((x0 * sin) + (y0 * cos));
            return { x: newX, y: newY };
        }

        // Draws the field then the tractor
        function drawFieldAndTractor() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById("scoreText").innerHTML = "Yield: " + yieldScore;
            drawField();
            drawTractor();

            if (nightFadeProgress >= 0.0)
                DrawNight();
        }

        // Updates camera position based on tractor position
        function updateCamera () {
            // Calculate the tractor's center point
            let tractorCenterX = tractorWorldX + (FRAME_WIDTH / 2);
            let tractorCenterY = tractorWorldY + (FRAME_HEIGHT / 2);

            // Aim the camera so the tractor's center is at the screen's center
            let targetCameraX = tractorCenterX - (canvas.width / 2);
            let targetCameraY = tractorCenterY - (canvas.height / 2);

            const maxCameraX = worldPixelWidth - canvas.width;
            const maxCameraY = worldPixelHeight - canvas.height;

            cameraX = Math.max(0, Math.min(targetCameraX, maxCameraX));
            cameraY = Math.max(0, Math.min(targetCameraY, maxCameraY));
        }

        function getDirectionName(angle) {
            const normalizedAngle = ((angle % 360) + 450) % 360 - 90;
            if (normalizedAngle === 0) return "Right →";
            if (normalizedAngle === 90) return "Down ↓";
            if (normalizedAngle === 180) return "Left ←";
            if (normalizedAngle === 270) return "Up ↑";
            return `${normalizedAngle}°`;
        }

        // moveForward function that moves over time
        function moveForward(duration) {
            return new Promise((resolve) => {
                const startTime = Date.now();
                const endTime = startTime + (duration * 1000);

                const moveX = SPEED * Math.cos(angle * Math.PI / 180);
                const moveY = SPEED * Math.sin(angle * Math.PI / 180);

                function animate() {
                    const currentTime = Date.now();
                    const elapsed = (currentTime - startTime) / 1000;

                    if (currentTime < endTime && isMoving) {
                        // Calculate how much to move based on frame time
                        const deltaTime = 1 / 60; // assuming 60fps

                        tractorWorldX += moveX * deltaTime;
                        tractorWorldY += moveY * deltaTime;

                        // cameraX = tractorWorldX - tractorScreenX;
                        // cameraY = tractorWorldY - tractorScreenY;
                        updateCamera();

                        drawFieldAndTractor();
                        animationId = requestAnimationFrame(animate);
                    } else {
                        resolve();
                    }
                }

                animate();
            });
        }

    	function turnLeft() {
        	goalAngle -= 90;
        	return OnNewGoalRotation();
    	}

    	function turnRight() {
        	goalAngle += 90;
        	return OnNewGoalRotation();
    	}

    	function TurnXLeft(amount) {
        	goalAngle -= amount;
        	return OnNewGoalRotation();
    	}

    	function TurnXRight(amount) {
        	goalAngle += amount;
        	return OnNewGoalRotation();
    	}

    	function OnNewGoalRotation() {
        	return new Promise((resolve) => {
           	 
            	function turn() {
                    const delta = 1 / 60; // assuming 60fps
               	 
                	if (angle != goalAngle) {
                        // For the actual turning.
                    	var difference = (goalAngle - angle);
                        var absDiff = Math.abs(difference);
                        var alpha = Math.min(turnSpeed*delta, absDiff) / absDiff;
                    	angle = angle*(1 - alpha) + goalAngle*alpha;

                        // // Move the tractor while turning, to look more natural.
                        const moveX = SPEED * Math.cos(angle * Math.PI / 180);
                        const moveY = SPEED * Math.sin(angle * Math.PI / 180);
                        tractorWorldX += moveX * delta;
                        tractorWorldY += moveY * delta;

                        // cameraX = tractorWorldX - tractorScreenX;
                        // cameraY = tractorWorldY - tractorScreenY;
                        updateCamera();

                    	drawFieldAndTractor();
                    	animationId = requestAnimationFrame(turn);
                	} else {
                    	resolve();
                	}
            	}
            	turn();
        	});
    	}

        function resetPosition() {
            if (!isInitialized) return;

            tractorWorldX = (columns * TILE_WIDTH) / 2;
            tractorWorldY = (rows * TILE_HEIGHT) / 2;
            angle = 0;

            // cameraX = tractorWorldX - tractorScreenX;
            // cameraY = tractorWorldY - tractorScreenY;
            updateCamera();

            goalAngle = 0;
            isHarvestingOn = false;
            isSeedingOn = false;
            isTractorOn = false;
            yieldScore = 0;
            nightFadeProgress = -1.0;
            resetField();
            drawFieldAndTractor();
        }

        function stopMovement() {
            isMoving = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = -1;
            }
        }

        // Initial draw
        // if (imageLoadCount === imageCount) drawFieldAndTractor();

        // Run button - now uses async/await
        document.getElementById('runButton').addEventListener('click', async function () {
            const runButton = document.getElementById('runButton');
            runButton.disabled = true;

            isMoving = true;

            const allBlocks = workspace.getAllBlocks(false);

            if (allBlocks.length > 0) {
                await fetchData();
                const code = Blockly.JavaScript.workspaceToCode(workspace);

                if (code.trim()) {
                    try {
                        // Wrap the code in an async function and execute
                        const asyncCode = `(async function() { ${code} })()`;
                        await eval(asyncCode);
                    } catch (e) {
                        console.error('ERROR:', e);
                    }
                }
            }
            isMoving = false;
            runButton.disabled = false;
        });

        // Stop button
        document.getElementById('stopButton').addEventListener('click', function () {
            stopMovement();
            runButton.disabled = false;
        });

        // Reset button
        document.getElementById('resetButton').addEventListener('click', function () {
            stopMovement();
            resetPosition();
            runButton.disabled = false;
        });
    </script>
</body>
