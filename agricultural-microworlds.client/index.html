<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AGsim</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        #blocklyDiv {
            flex: 1;
            min-width: 0;
        }

        #canvasArea {
            width: 800px;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 3px solid #ccc;
            padding: 20px;
        }

        canvas {
            border: 2px solid #333;
            background-color: #fff;
            margin-bottom: 20px;
        }

        #runButton {
            padding: 10px 20px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #resetButton {
            padding: 10px 20px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #stopButton {
            padding: 10px 20px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #debug {
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            min-height: 60px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Blockly workspace -->
        <div id="blocklyDiv"></div>
        <!-- Canvas + Run button -->
        <div id="canvasArea">
            <p id="scoreText">Yield: 0</p>
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <button id="runButton">Run Code</button>
            <button id="stopButton">Stop</button>
            <button id="resetButton">Reset Position</button>
            <div id="debug">Drag blocks to workspace, then click Run</div>
        </div>
    </div>
    <script>
        // Define custom blocks
        Blockly.defineBlocksWithJsonArray([
            {
                "type": "move_forward",
                "message0": "move forward for %1 seconds",
                "args0": [
                    {
                        "type": "input_value",
                        "name": "DURATION",
                        "check": "Number"
                    }
                ],
                "previousStatement": null,
                "nextStatement": null,
                "colour": 160,
                "tooltip": "Move forward for specified seconds"
            },
            {
                "type": "turn_left",
                "message0": "turn left",
                "previousStatement": null,
                "nextStatement": null,
                "colour": 210,
                "tooltip": "Turn the tractor left"
            },
            {
                "type": "turn_right",
                "message0": "turn right",
                "previousStatement": null,
                "nextStatement": null,
                "colour": 210,
                "tooltip": "Turn the tractor right"
            },
            {
                "type": "turn_left_x_degrees",
                "message0": "Turn %1 degrees left",
                "args0": [
                    {
                        "type": "input_value",
                        "name": "DEGREES",
                        "check": "Number"
                    }
                ],
                "previousStatement": null,
                "nextStatement": null,
                "colour": 210,
                "tooltip": "Turn the tractor a certain amount of degrees left"
            },
            {
                "type": "turn_right_x_degrees",
                "message0": "Turn %1 degrees right",
                "args0": [
                    {
                        "type": "input_value",
                        "name": "DEGREES",
                        "check": "Number"
                    }
                ],
                "previousStatement": null,
                "nextStatement": null,
                "colour": 210,
                "tooltip": "Turn the tractor a certain amount of degrees right"
            },
            {
                "type": "math_number",
                "message0": "%1",
                "args0": [
                    {
                        "type": "field_number",
                        "name": "NUM",
                        "value": 1
                    }
                ],
                "output": "Number",
                "colour": 230
            },
            {
                "type": "turn_harvesting_on",
                "message0": "turn harvesting on",
                "previousStatement": null,
                "nextStatement": null,
                colour: 210,
                tooltip: "Turns harvesting on tractor on"
            },
            {
                "type": "turn_harvesting_off",
                "message0": "turn harvesting off",
                "previousStatement": null,
                "nextStatement": null,
                colour: 210,
                tooltip: "Turns harvesting on tractor off"
            },
            {
                "type": "turn_seeding_on",
                "message0": "turn seeding on",
                "previousStatement": null,
                "nextStatement": null,
                colour: 210,
                tooltip: "Turns seeding on tractor on"
            },
            {
                "type": "turn_seeding_off",
                "message0": "turn seeding off",
                "previousStatement": null,
                "nextStatement": null,
                colour: 210,
                tooltip: "Turns seeding on tractor off"
            }
        ]);

        // Define JavaScript generators
        Blockly.JavaScript.forBlock['move_forward'] = function (block) {
            const duration = Blockly.JavaScript.valueToCode(block, 'DURATION', Blockly.JavaScript.ORDER_ATOMIC) || '1';
            return `await moveForward(${duration});\n`;
        };

        Blockly.JavaScript.forBlock['turn_left'] = function (block) {
            return 'turnLeft();\n';
        };

        Blockly.JavaScript.forBlock['turn_right'] = function (block) {
            return 'turnRight();\n';
        };

        Blockly.JavaScript.forBlock['turn_left_x_degrees'] = function (block) {
            const amount = Blockly.JavaScript.valueToCode(block, 'DEGREES', Blockly.JavaScript.ORDER_ATOMIC) || '1';
            return `await TurnXLeft(${amount});\n`;
        };

        Blockly.JavaScript.forBlock['turn_right_x_degrees'] = function (block) {
            const amount = Blockly.JavaScript.valueToCode(block, 'DEGREES', Blockly.JavaScript.ORDER_ATOMIC) || '1';
            return `await TurnXRight(${amount});\n`;
        };
        Blockly.JavaScript.forBlock['turn_harvesting_on'] = function (block) {
            return 'turnHarvestingOn();\n';
        };
        Blockly.JavaScript.forBlock['turn_harvesting_off'] = function (block) {
            return 'turnHarvestingOff();\n';
        };
        Blockly.JavaScript.forBlock['turn_seeding_on'] = function (block) {
            return 'turnSeedingOn();\n';
        };
        Blockly.JavaScript.forBlock['turn_seeding_off'] = function (block) {
            return 'turnSeedingOff();\n';
        };

        Blockly.JavaScript.forBlock['math_number'] = function (block) {
            const number = block.getFieldValue('NUM');
            return [number, Blockly.JavaScript.ORDER_ATOMIC];
        };

        // Toolbox definition
        const toolbox = {
            "kind": "categoryToolbox",
            "contents": [
                {
                    "kind": "category",
                    "name": "Movement",
                    "colour": "#5b67a5",
                    "contents": [
                        { "kind": "block", "type": "move_forward" },
                        { "kind": "block", "type": "turn_left" },
                        { "kind": "block", "type": "turn_right" },
                        { "kind": "block", "type": "turn_left_x_degrees" },
                        { "kind": "block", "type": "turn_right_x_degrees" },
                    ]
                },
                {
                    "kind": "category",
                    "name": "Numbers",
                    "colour": "#5b9aa5",
                    "contents": [
                        { "kind": "block", "type": "math_number" },
                        { "kind": "block", "type": "math_random_int" }
                    ]
                }, {
                    "kind": "category",
                    "name": "Control",
                    "colour": "#5b12a5",
                    "contents": [
                        {
                            "kind": "block", "type": "controls_if"
                        },
                        { "kind": "block", "type": "turn_harvesting_on" },
                        { "kind": "block", "type": "turn_harvesting_off" },
                        { "kind": "block", "type": "turn_seeding_on" },
                        { "kind": "block", "type": "turn_seeding_off" },
                    ]
                },
                {
                    "kind": "category",
                    "name": "Logic",
                    "colour": "#5b9dd5",
                    "contents": [
                        { "kind": "block", "type": "logic_boolean" }
                    ]
                },
                {
                    "kind": "category",
                    "name": "Loops",
                    "colour": "#5a1dd5",
                    "contents": [
                        { "kind": "block", "type": "controls_repeat_ext" },
                        { "kind": "block", "type": "controls_whileUntil" }

                    ]
                }
            ]
        };

        // Inject Blockly
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: toolbox,
            trashcan: true
        });

        // Canvas and movement code
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let yieldScore = 0;

        let x = canvas.width / 2;
        let y = canvas.height / 2;
        let angle = 0; // 0 degrees = facing right
        let isMoving = false;
        let isHarvestingOn = false;
        let isSeedingOn = false;
        let animationId = -1;

        const SPEED = 50; // pixels per second
        // --- Sprite setup ---
        const tractorSprite = new Image();
        const wheatImage = new Image();
        const seedImage = new Image();
        const dirtImage = new Image();

        tractorSprite.src = "./src/assets/combine-harvester.png";
        wheatImage.src = "./src/assets/wheat.png";
        seedImage.src = "./src/assets/T2D_Planted_Placeholder.png";
        dirtImage.src = "./src/assets/T2D_Dirt_Placeholder.png";


        let imageLoadCount = 0;
        const imageCount = 4;

        tractorSprite.onload = () => {
            console.log("✅ Tractor sprite loaded!");
            imageLoadCount++;
            if (imageLoadCount === imageCount) { drawFieldAndTractor(); }
        };
        tractorSprite.onerror = () => {
            console.error("❌ Failed to load tractor sprite!");
        };
        dirtImage.onload = () => {
            console.log("DirtImage loaded!");
            imageLoadCount++;
            if (imageLoadCount === imageCount) { drawFieldAndTractor(); }
        }
        dirtImage.onerror = () => {
            console.error("failed to load DirtImage");
        }
        seedImage.onload = () => {
            console.log("SeedImage loaded!");
            imageLoadCount++;
            if (imageLoadCount === imageCount) { drawFieldAndTractor(); }
        }
        seedImage.onerror = () => {
            console.error("failed to load SeedImage");
        }
        wheatImage.onload = () => {
            console.log("WheatImage loaded!");
            imageLoadCount++;
            if (imageLoadCount === imageCount) { drawFieldAndTractor(); }
        }
        wheatImage.onerror = () => {
            console.error("failed to load WheatImage");
        }

        function turnHarvestingOn() {
            isHarvestingOn = true;
            isSeedingOn = false;
        }
        function turnHarvestingOff() {
            isHarvestingOn = false;
        }
        function turnSeedingOn() {
            isSeedingOn = true;
            isHarvestingOn = false;
        }
        function turnSeedingOff() {
            isSeedingOn = false;
        }


        const FRAME_WIDTH = 64;  // change to sprite’s frame width
        const FRAME_HEIGHT = 64; // change to sprite’s frame height

        // --- Draw the tractor sprite based on current direction ---
        function drawTractor() {
            const normalizedAngle = ((angle % 360) + 360) % 360;
            var angleInRadians = normalizedAngle * Math.PI / 180;

            // tractorsprite
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angleInRadians);
            ctx.drawImage(tractorSprite, 0, 0);
            ctx.restore();

            document.getElementById('debug').innerHTML =
                `Position: (${Math.round(x)}, ${Math.round(y)})<br>` +
                `Angle: ${normalizedAngle}°<br>` +
                `Direction: ${getDirectionName(angle)}<br>` +
                `Moving: ${isMoving ? 'Yes' : 'No'} <br>`;
        }
        //setting up the array that represents the field
        const fieldScale = 4;
        const rows = Math.floor(canvas.height / seedImage.height * fieldScale) + 1;
        const columns = Math.floor(canvas.width / seedImage.width * fieldScale) + 1;

        const field = Array.from({ length: rows }, () => new Array(columns).fill(2));

        //set the entire field to planted values
        function resetField() {
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < columns; j++) {
                    field[i][j] = 2;
                }
            }
        }

        //draws the field onto the canvas
        function drawField() {// add more restrictions, such as if seed over crop destroy the crop, if harvest seed no benefit(score)\
            // top left corner coordinates of the tractor
            const xTopLeftCorner = x - (FRAME_WIDTH / 2);
            const yTopLeftCorner = y - (FRAME_HEIGHT / 2);

            const tileWidth = wheatImage.width / fieldScale;
            const tileHeight = wheatImage.height / fieldScale;

            const topLeft = (-FRAME_WIDTH / 2, -FRAME_HEIGHT / 2);
            const topRight = (FRAME_WIDTH / 2, -FRAME_HEIGHT / 2);
            const bottomRight = (FRAME_WIDTH / 2, FRAME_HEIGHT / 2);
            const bottomLeft = (-FRAME_WIDTH / 2, FRAME_HEIGHT / 2);

            function rotatePoint(x, y, angle, centerX, centerY) { // DETECTION ORIGIN IS STILL SLIGHTLY TO THE LEFT OF WHERE IT IS SUPPOSED TO BE
                const angleInRadians = angle * (Math.PI / 180);
                const cos = Math.cos(angleInRadians);
                const sin = Math.sin(angleInRadians);
                let newX = x * cos - y * sin + centerX;
                let newY = x * sin + y * cos + centerY;
                return { x: newX, y: newY };
            }

            const corners = [
                rotatePoint(-FRAME_WIDTH / 2, -FRAME_HEIGHT / 2, angle, x, y), //topLeft //fix angle to radians
                rotatePoint(FRAME_WIDTH / 2, -FRAME_HEIGHT / 2, angle, x, y), //topRight
                rotatePoint(FRAME_WIDTH / 2, FRAME_HEIGHT / 2, angle, x, y), // bottomRight
                rotatePoint(-FRAME_WIDTH / 2, FRAME_HEIGHT / 2, angle, x, y)  // bottomLeft
            ];

            const frontSide = [corners[1], corners[2]]; // right side of image when angle = 0

            function detectWhatTilesAreHit(x0, y0, x1, y1) {
                if (Math.abs(y1 - y0) < Math.abs(x1 - x0)) {
                    if (x0 > x1) detectGentleSlope(x1, y1, x0, y0);
                    else detectGentleSlope(x0, y0, x1, y1);
                }
                else {
                    if (y0 > y1) detectSteepSlope(x1, y1, x0, y0);
                    else detectSteepSlope(x0, y0, x1, y1);
                }
            }

            function detectGentleSlope(x0, y0, x1, y1) {
                let deltaX = x1 - x0;
                let deltaY = y1 - y0;

                let yi = 1;

                if (deltaY < 0) {
                    yi = -1;
                    deltaY = -deltaY;
                }
                let D = (2 * deltaY) - deltaX;
                let y = y0;

                for (let x = x0; x < x1; x++) {
                    changeTile(Math.floor(x / tileWidth), Math.floor(y / tileHeight));
                    if (D > 0) {
                        y = y + yi;
                        D = D + (2 * (deltaY - deltaX));
                    }
                    else D = D + 2 * deltaY;
                }
            }
            function detectSteepSlope(x0, y0, x1, y1) {
                let deltaX = x1 - x0;
                let deltaY = y1 - y0;

                let xi = 1;

                if (deltaX < 0) {
                    xi = -1;
                    deltaX = -deltaX;
                }
                let D = (2 * deltaX) - deltaY;
                let x = x0;

                for (let y = y0; y < y1; y++) {
                    changeTile(Math.floor(x/tileWidth), Math.floor(y/tileHeight));
                    if (D > 0) {
                        x = x + xi;
                        D = D + (2 * (deltaX - deltaY));
                    }
                    else D = D + 2 * deltaX;
                }
            }

            function changeTile(x, y) { // index check
                if (isHarvestingOn) {
                    if (field[y][x] === 2) {
                        field[y][x] = 0;
                        console.log(`changed x: ${x} and y: ${y}`)
                        yieldScore++;
                    }
                    else if (field[y][x] === 1) {
                        field[y][x] = 0;
                        console.log(`changed x: ${x} and y: ${y}`)
                    }
                }
                else if (isSeedingOn) {
                    if (field[y][x] === 0) {
                        field[y][x] = 1;
                        console.log(`changed x: ${x} and y: ${y}`)
                        yieldScore++;
                    }
                }
            }

            detectWhatTilesAreHit(frontSide[0].x, frontSide[0].y, frontSide[1].x, frontSide[1].y);

            // draw the entire field
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < columns; j++) {
                    let dirtOrWheat = dirtImage;
                    switch (field[i][j]) {
                        case 0:
                            dirtOrWheat = dirtImage;
                            break;
                        case 1:
                            dirtOrWheat = seedImage;
                            break;
                        case 2:
                            dirtOrWheat = wheatImage;
                            break;
                    }
                    ctx.drawImage(dirtOrWheat, 0, 0, seedImage.width, seedImage.height, (j * seedImage.width / fieldScale), (i * seedImage.height / fieldScale), seedImage.width / fieldScale, seedImage.height / fieldScale);
                }
            }
        }

        // draws the field then the tractor
        function drawFieldAndTractor() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById("scoreText").innerHTML = "Yield: " + yieldScore;
            drawField();
            drawTractor();
        }


        function getDirectionName(angle) {
            const normalizedAngle = ((angle % 360) + 450) % 360;
            if (normalizedAngle === 0) return "Right →";
            if (normalizedAngle === 90) return "Down ↓";
            if (normalizedAngle === 180) return "Left ←";
            if (normalizedAngle === 270) return "Up ↑";
            return `${normalizedAngle}°`;
        }

        // moveForward function that moves over time
        function moveForward(duration) {
            return new Promise((resolve) => {
                const startTime = Date.now();
                const endTime = startTime + (duration * 1000);

                const moveX = SPEED * Math.cos(angle * Math.PI / 180);
                const moveY = SPEED * Math.sin(angle * Math.PI / 180);

                function animate() {
                    const currentTime = Date.now();
                    const elapsed = (currentTime - startTime) / 1000;

                    if (currentTime < endTime && isMoving) {
                        // Calculate how much to move based on frame time
                        const deltaTime = 1 / 60; // assuming 60fps
                        x += moveX * deltaTime;
                        y += moveY * deltaTime;

                        drawFieldAndTractor();
                        animationId = requestAnimationFrame(animate);
                    } else {
                        resolve();
                    }
                }
                animate();
            });
        }

        function turnLeft() {
            angle -= 90;
            drawFieldAndTractor();
        }

        function turnRight() {
            angle += 90;
            drawFieldAndTractor();
        }

        function TurnXLeft(amount) {
            angle -= amount;
            drawFieldAndTractor();
        }

        function TurnXRight(amount) {
            angle += amount;
            drawFieldAndTractor();
        }

        function resetPosition() {
            x = canvas.width / 2;
            y = canvas.height / 2;
            angle = 0;
            isHarvestingOn = false;
            isSeedingOn = false;
            isTractorOn = false;
            yieldScore = 0;
            resetField();
            drawFieldAndTractor();
        }

        function stopMovement() {
            isMoving = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = -1;
            }
        }

        // Initial draw
        if (imageLoadCount === imageCount) drawFieldAndTractor();

        // Run button - now uses async/await
        document.getElementById('runButton').addEventListener('click', async function () {
            const runButton = document.getElementById('runButton');
            runButton.disabled = true;

            isMoving = true;

            const allBlocks = workspace.getAllBlocks(false);

            if (allBlocks.length > 0) {
                const code = Blockly.JavaScript.workspaceToCode(workspace);

                if (code.trim()) {
                    try {
                        // Wrap the code in an async function and execute
                        const asyncCode = `(async function() { ${code} })()`;
                        await eval(asyncCode);
                    } catch (e) {
                        console.error('ERROR:', e);
                    }
                }
            }
            isMoving = false;
            runButton.disabled = false;
        });

        // Stop button
        document.getElementById('stopButton').addEventListener('click', function () {
            stopMovement();
            runButton.disabled = false;
        });

        // Reset button
        document.getElementById('resetButton').addEventListener('click', function () {
            stopMovement();
            resetPosition();
            runButton.disabled = false;
        });
    </script>
</body>
</html>
