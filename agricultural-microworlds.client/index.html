<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AGsim</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        #blocklyDiv {
            flex: 1;
            min-width: 0;
        }

        #canvasArea {
            width: 800px;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 3px solid #ccc;
            padding: 20px;
        }

        canvas {
            border: 2px solid #333;
            background-color: #fff;
            margin-bottom: 20px;
        }

        #runButton {
            padding: 10px 20px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #resetButton {
            padding: 10px 20px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #stopButton {
            padding: 10px 20px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #debug {
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            min-height: 60px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Blockly workspace -->
        <div id="blocklyDiv"></div>
        <!-- Canvas + Run button -->
        <div id="canvasArea">
            <p id="weekText">Week 1</p>
            <p id="scoreText">Yield: 0</p>
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <button id="runButton">Run Code</button>
            <button id="stopButton">Stop</button>
            <button id="resetButton">Reset Position</button>
            <div id="debug">Drag blocks to workspace, then click Run</div>
        </div>
    </div>
    <script>
        // Define custom blocks
        Blockly.defineBlocksWithJsonArray([
            {
                "type": "move_forward",
                "message0": "move forward for %1 seconds",
                "args0": [
                    {
                        "type": "input_value",
                        "name": "DURATION",
                        "check": "Number"
                    }
                ],
                "previousStatement": null,
                "nextStatement": null,
                "colour": 160,
                "tooltip": "Move forward for specified seconds"
            },
            {
                "type": "turn_left",
                "message0": "turn left",
                "previousStatement": null,
                "nextStatement": null,
                "colour": 210,
                "tooltip": "Turn the tractor left"
            },
            {
                "type": "turn_right",
                "message0": "turn right",
                "previousStatement": null,
                "nextStatement": null,
                "colour": 210,
                "tooltip": "Turn the tractor right"
            },
            {
                "type": "turn_left_x_degrees",
                "message0": "Turn %1 degrees left",
                "args0": [
                    {
                        "type": "input_value",
                        "name": "DEGREES",
                        "check": "Number"
                    }
                ],
                "previousStatement": null,
                "nextStatement": null,
                "colour": 210,
                "tooltip": "Turn the tractor a certain amount of degrees left"
            },
            {
                "type": "turn_right_x_degrees",
                "message0": "Turn %1 degrees right",
                "args0": [
                    {
                        "type": "input_value",
                        "name": "DEGREES",
                        "check": "Number"
                    }
                ],
                "previousStatement": null,
                "nextStatement": null,
                "colour": 210,
                "tooltip": "Turn the tractor a certain amount of degrees right"
            },
            {
                "type": "math_number",
                "message0": "%1",
                "args0": [
                    {
                        "type": "field_number",
                        "name": "NUM",
                        "value": 1
                    }
                ],
                "output": "Number",
                "colour": 230
            },
            {
                "type": "turn_harvesting_on",
                "message0": "turn harvesting on",
                "previousStatement": null,
                "nextStatement": null,
                colour: 210,
                tooltip: "Turns harvesting on tractor on"
            },
            {
                "type": "turn_harvesting_off",
                "message0": "turn harvesting off",
                "previousStatement": null,
                "nextStatement": null,
                colour: 210,
                tooltip: "Turns harvesting on tractor off"
            },
            {
                "type": "turn_seeding_on",
                "message0": "turn seeding on",
                "previousStatement": null,
                "nextStatement": null,
                colour: 210,
                tooltip: "Turns seeding on tractor on"
            },
            {
                "type": "turn_seeding_off",
                "message0": "turn seeding off",
                "previousStatement": null,
                "nextStatement": null,
                colour: 210,
                tooltip: "Turns seeding on tractor off"
            },
            {
                "type": "wait_x_weeks",
                "message0": "wait %1 weeks",
                "args0": [
                    {
                        "type": "input_value",
                        "name": "WEEKS",
                        "check": "Number"
                    }
                ],
                "previousStatement": null,
                "nextStatement": null,
                "colour": 210,
                "tooltip": "Wait for a certain number of weeks"
            }
        ]);

        // Define JavaScript generators
        Blockly.JavaScript.forBlock['move_forward'] = function (block) {
            const duration = Blockly.JavaScript.valueToCode(block, 'DURATION', Blockly.JavaScript.ORDER_ATOMIC) || '1';
            return `await moveForward(${duration});\n`;
        };

        Blockly.JavaScript.forBlock['turn_left'] = function (block) {
            return `await turnLeft();\n`;
        };

        Blockly.JavaScript.forBlock['turn_right'] = function (block) {
            return `await turnRight();\n`;
        };

        Blockly.JavaScript.forBlock['turn_left_x_degrees'] = function (block) {
            const amount = Blockly.JavaScript.valueToCode(block, 'DEGREES', Blockly.JavaScript.ORDER_ATOMIC) || '1';
            return `await TurnXLeft(${amount});\n`;
        };

        Blockly.JavaScript.forBlock['turn_right_x_degrees'] = function (block) {
            const amount = Blockly.JavaScript.valueToCode(block, 'DEGREES', Blockly.JavaScript.ORDER_ATOMIC) || '1';
            return `await TurnXRight(${amount});\n`;
        };
        Blockly.JavaScript.forBlock['turn_harvesting_on'] = function (block) {
            return 'turnHarvestingOn();\n';
        };
        Blockly.JavaScript.forBlock['turn_harvesting_off'] = function (block) {
            return 'turnHarvestingOff();\n';
        };
        Blockly.JavaScript.forBlock['turn_seeding_on'] = function (block) {
            return 'turnSeedingOn();\n';
        };
        Blockly.JavaScript.forBlock['turn_seeding_off'] = function (block) {
            return 'turnSeedingOff();\n';
        };
        Blockly.JavaScript.forBlock['wait_x_weeks'] = function (block) {
            const weeks = Blockly.JavaScript.valueToCode(block, 'WEEKS', Blockly.JavaScript.ORDER_ATOMIC) || '1';
            return `waitXWeeks(${weeks});\n`;
        };

        Blockly.JavaScript.forBlock['math_number'] = function (block) {
            const number = block.getFieldValue('NUM');
            return [number, Blockly.JavaScript.ORDER_ATOMIC];
        };

        // Toolbox definition
        const toolbox = {
            "kind": "categoryToolbox",
            "contents": [
                {
                    "kind": "category",
                    "name": "Movement",
                    "colour": "#5b67a5",
                    "contents": [
                        { "kind": "block", "type": "move_forward" },
                        { "kind": "block", "type": "turn_left" },
                        { "kind": "block", "type": "turn_right" },
                        { "kind": "block", "type": "turn_left_x_degrees" },
                        { "kind": "block", "type": "turn_right_x_degrees" },
                    ]
                },
                {
                    "kind": "category",
                    "name": "Numbers",
                    "colour": "#5b9aa5",
                    "contents": [
                        { "kind": "block", "type": "math_number" },
                        { "kind": "block", "type": "math_random_int" }
                    ]
                }, {
                    "kind": "category",
                    "name": "Control",
                    "colour": "#5b12a5",
                    "contents": [
                        {
                            "kind": "block", "type": "controls_if"
                        },
                        { "kind": "block", "type": "turn_harvesting_on" },
                        { "kind": "block", "type": "turn_harvesting_off" },
                        { "kind": "block", "type": "turn_seeding_on" },
                        { "kind": "block", "type": "turn_seeding_off" },
                        { "kind": "block", "type": "wait_x_weeks" }
                    ]
                },
                {
                    "kind": "category",
                    "name": "Logic",
                    "colour": "#5b9dd5",
                    "contents": [
                        { "kind": "block", "type": "logic_boolean" }
                    ]
                },
                {
                    "kind": "category",
                    "name": "Loops",
                    "colour": "#5a1dd5",
                    "contents": [
                        { "kind": "block", "type": "controls_repeat_ext" },
                        { "kind": "block", "type": "controls_whileUntil" }

                    ]
                }
            ]
        };

        // Inject Blockly
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: toolbox,
            trashcan: true
        });

        // Canvas and movement code
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Global variables

        // Tractor variables
        let tractorWorldX = canvas.width / 2; // Tractor's vertical position in the entire world
        let tractorWorldY = canvas.height / 2; // Tractor's horizontal position in the entire world
        const tractorScreenX = canvas.width / 2; // Tractor's vertical position on the screen
        const tractorScreenY = canvas.height / 2; // Tractor's horizontal position on the screen
        let angle = 0; // 0 degrees = facing right
    	let goalAngle = 0; // Our angle will be set to move towards this.
    	let turnSpeed = 90; //How fast the tractor can turn.
        let isMoving = false;
        let isHarvestingOn = false;
        let isSeedingOn = false;
        let animationId = -1;
        let yieldScore = 0;
        let nightFadeProgress = -1.0; // The progress for the night transition animation. Ranges from 0-1 when active.

        // Camera Variables
        let cameraX = tractorWorldX - tractorScreenX; // Top-left corner of the camera in world coordinates
        let cameraY = tractorWorldY - tractorScreenY; // Top-left corner of the camera in world coordinates

        // Game asset constants
        const FRAME_WIDTH = 64;  // change to sprite’s frame width
        const FRAME_HEIGHT = 64; // change to sprite’s frame height
        const TILE_BASE_SIZE = 64; // The original size of the field tiles
        const fieldScale = 8; // The amount the field tiles will be scaled down by
        const SPEED = 20; // pixels per second

        // Time variables
        const START_WEEK = 1; // starting week
        const GROWTH_WEEKS = 18; // weeks for crops to fully grow
        let currentWeek = START_WEEK; // current week in simulation
        let weeksPassedSincePlanting = 0; // weeks passed since last planting

        // Field variables
        const tileWidth = TILE_BASE_SIZE / fieldScale;
        const tileHeight = TILE_BASE_SIZE / fieldScale;

        // Setting up the array that represents the field
        const WORLD_WIDTH_IN_SCREENS = 5;
        const WORLD_HEIGHT_IN_SCREENS = 5;
        const screenRows = Math.floor(canvas.height / tileHeight) + 2;
        const screenCols = Math.floor(canvas.width / tileWidth) + 2;

        const rows = screenRows * WORLD_HEIGHT_IN_SCREENS;
        const columns = screenCols * WORLD_WIDTH_IN_SCREENS;

        let field = [];

        // --- Sprite setup ---
        const tractorSprite = new Image();
        const wheatImage = new Image();
        const seedImage = new Image();
        const dirtImage = new Image();

        // Paths for the images
        tractorSprite.src = "./src/assets/combine-harvester.png";
        wheatImage.src = "./src/assets/wheat.png";
        seedImage.src = "./src/assets/T2D_Planted_Placeholder.png";
        dirtImage.src = "./src/assets/T2D_Dirt_Placeholder.png";

        // Variables to aid in image loading
        let imageLoadCount = 0;
        const imageCount = 4;
        let isInitialized = false;

        // Image loading
        function onImageLoad() {
            imageLoadCount++;
            if (imageLoadCount === imageCount && !isInitialized) {
                console.log("All images loaded!");
                isInitialized = true;

                // Initialize the field array
                console.log(`Initalizing world: ${columns}x${rows} tiles`);
                field = Array.from({ length: rows }, () => new Array(columns).fill(2));

                // Set initial position and draw
                resetPosition();
            }
        }

        // Loading methods for images
        tractorSprite.onload = () => {
            console.log("✅ Tractor sprite loaded!");
            onImageLoad();
        };
        tractorSprite.onerror = () => {
            console.error("❌ Failed to load tractor sprite!");
        };
        dirtImage.onload = () => {
            console.log("DirtImage loaded!");
            onImageLoad();
        }
        dirtImage.onerror = () => {
            console.error("failed to load DirtImage");
        }
        seedImage.onload = () => {
            console.log("SeedImage loaded!");
            onImageLoad();
        }
        seedImage.onerror = () => {
            console.error("failed to load SeedImage");
        }
        wheatImage.onload = () => {
            console.log("WheatImage loaded!");
            onImageLoad();
        }
        wheatImage.onerror = () => {
            console.error("failed to load WheatImage");
        }

        // Methods for Harvesting and Seeding Blocks
        function turnHarvestingOn() {
            isHarvestingOn = true;
            isSeedingOn = false;
        }
        function turnHarvestingOff() {
            isHarvestingOn = false;
        }
        function turnSeedingOn() {
            isSeedingOn = true;
            isHarvestingOn = false;
        }
        function turnSeedingOff() {
            isSeedingOn = false;
        }

        // Method for Wait X Weeks Block
        function waitXWeeks(weeks) {
            currentWeek += weeks;
            weeksPassedSincePlanting += weeks;
            if (weeksPassedSincePlanting >= GROWTH_WEEKS) {
                growCrops();
                weeksPassedSincePlanting = 0; // reset after growth
            }
            document.getElementById('weekText').innerHTML = `Week ${currentWeek}`;
        }

        function growCrops() {
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < columns; j++) {
                    if (field[i][j] === 1) {
                        field[i][j] = 2; // Seeded tile becomes wheat
                    }
                }
            }
            drawFieldAndTractor();
        }

        // --- Draw the tractor sprite based on current direction ---
        function drawTractor() {
            const normalizedAngle = ((angle % 360) + 360) % 360;
            var angleInRadians = normalizedAngle * Math.PI / 180;

            // tractorsprite
            ctx.save();
            ctx.translate(tractorScreenX + FRAME_WIDTH / 2, tractorScreenY + FRAME_HEIGHT / 2);
            ctx.rotate(angleInRadians);
            ctx.drawImage(tractorSprite, -FRAME_WIDTH / 2, -FRAME_HEIGHT / 2);
            ctx.restore();

            document.getElementById('debug').innerHTML = //debugging window
                `World Position: (${Math.round(tractorWorldX)}, ${Math.round(tractorWorldY)})<br>` +
                `Angle: ${normalizedAngle}°<br>` +
                `Direction: ${getDirectionName(angle)}<br>` +
                `Moving: ${isMoving ? 'Yes' : 'No'} <br>`;
        }


        // Draws the field onto the canvas
        function drawField() {
            const topLeft = { x: -FRAME_WIDTH / 2, y: -FRAME_HEIGHT / 2 };
            const topRight = { x: FRAME_WIDTH / 2, y: -FRAME_HEIGHT / 2 };
            const bottomRight = { x: FRAME_WIDTH / 2, y: FRAME_HEIGHT / 2 };
            const bottomLeft = { x: -FRAME_WIDTH / 2, y: FRAME_HEIGHT / 2 };
            const center = { x: tractorWorldX + (FRAME_WIDTH / 2), y: tractorWorldY + (FRAME_HEIGHT / 2) };

            const corners = [
                rotatePoint(topLeft.x, topLeft.y, angle, center.x, center.y), //topLeft
                rotatePoint(topRight.x, topRight.y, angle, center.x, center.y), //topRight
                rotatePoint(bottomRight.x, bottomRight.y, angle, center.x, center.y), // bottomRight
                rotatePoint(bottomLeft.x, bottomLeft.y, angle, center.x, center.y), // bottomLeft
            ];

            const frontSide = [corners[1], corners[2]]; // right side of image when angle = 0

            detectWhatTilesAreHit(frontSide[0].x, frontSide[0].y, frontSide[1].x, frontSide[1].y);

            // draw the entire field using camera coordinates

            const startCol = Math.floor(cameraX / tileWidth);
            const endCol = Math.min(columns, startCol + screenCols);
            const startRow = Math.floor(cameraY / tileHeight);
            const endRow = Math.min(rows, startRow + screenRows);
            
            for (let i = startRow; i < endRow; i++) {
                for (let j = startCol; j < endCol; j++) {
                    if (i < 0 || j < 0) continue; // skip negative indices

                    let dirtOrWheat = dirtImage;
                    switch (field[i][j]) {
                        case 0:
                            dirtOrWheat = dirtImage;
                            break;
                        case 1:
                            dirtOrWheat = seedImage;
                            break;
                        case 2:
                            dirtOrWheat = wheatImage;
                            break;
                    }
                    const tileWorldX = j * tileWidth;
                    const tileWorldY = i * tileHeight;

                    const tileScreenX = tileWorldX - cameraX;
                    const tileScreenY = tileWorldY - cameraY;

                    ctx.drawImage(dirtOrWheat, 0, 0, TILE_BASE_SIZE, TILE_BASE_SIZE,
                        Math.floor(tileScreenX),
                        Math.floor(tileScreenY),
                        tileWidth,
                        tileHeight);
                }
            }
        }

        function DrawNight() {
            let alpha = 0.75*Math.sin(nightFadeProgress * Math.PI);
            ctx.fillStyle = `rgba(15, 15, 75, ${alpha})`; // Set fill color to a transparent blue
            ctx.fillRect(0, 0, canvas.width, canvas.height); // Draw the overlay
        }

        // Detects and changes which tiles are in the line from point0, to point1 for a gentle slope
        function detectGentleSlope(x0, y0, x1, y1) {
            let deltaX = x1 - x0;
            let deltaY = y1 - y0;

            let yi = 1;

            if (deltaY < 0) {
                yi = -1;
                deltaY = -deltaY;
            }
            let D = (2 * deltaY) - deltaX;
            let y = y0;

            for (let x = x0; x < x1; x++) {
                changeTile(Math.floor(x / tileWidth), Math.floor(y / tileHeight));
                if (D > 0) {
                    y = y + yi;
                    D = D + (2 * (deltaY - deltaX));
                }
                else D = D + 2 * deltaY;
            }
        }

        // Detects and changes which tiles are in the line from point0, to point1 for a steep slope
        function detectSteepSlope(x0, y0, x1, y1) {
            let deltaX = x1 - x0;
            let deltaY = y1 - y0;

            let xi = 1;

            if (deltaX < 0) {
                xi = -1;
                deltaX = -deltaX;
            }
            let D = (2 * deltaX) - deltaY;
            let x = x0;

            for (let y = y0; y < y1; y++) {
                changeTile(Math.floor(x / tileWidth), Math.floor(y / tileHeight));
                if (D > 0) {
                    x = x + xi;
                    D = D + (2 * (deltaX - deltaY));
                }
                else D = D + 2 * deltaX;
            }
        }

        // Changes the tile at field[y][x] to the apropriate value based on the current mode of the vehicle
        function changeTile(x, y) {
            if (x >= 0 && x < columns && y >= 0 && y < rows) {
                if (isHarvestingOn) {
                    if (field[y][x] === 2) {
                        field[y][x] = 0;
                        yieldScore++;
                    }
                    else if (field[y][x] === 1) {
                        field[y][x] = 0;
                    }
                }
                else if (isSeedingOn) {
                    if (field[y][x] === 0) {
                        field[y][x] = 1;
                        yieldScore++;
                    }
                }
            }
        }

        // Detects wether the slope from point0 to point1 is steep or gentle then calls the appropriate method to detect tiles in that line
        function detectWhatTilesAreHit(x0, y0, x1, y1) {
            if (Math.abs(y1 - y0) < Math.abs(x1 - x0)) {
                if (x0 > x1) detectGentleSlope(x1, y1, x0, y0);
                else detectGentleSlope(x0, y0, x1, y1);
            }
            else {
                if (y0 > y1) detectSteepSlope(x1, y1, x0, y0);
                else detectSteepSlope(x0, y0, x1, y1);
            }
        }

        // Resets the field to be the value of the Wheat tile
        function resetField() {
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < columns; j++) {
                    field[i][j] = 2;
                }
            }
        }

        // Rotates x and y coordinates to a new location based on the an angle and the center of rotation
        function rotatePoint(x0, y0, angle, centerX, centerY) {
            const angleInRadians = angle * (Math.PI / 180);
            const cos = Math.cos(angleInRadians);
            const sin = Math.sin(angleInRadians);
            var newX = centerX + ((x0 * cos) - (y0 * sin));
            var newY = centerY + ((x0 * sin) + (y0 * cos));
            return { x: newX, y: newY };
        }

        // Draws the field then the tractor
        function drawFieldAndTractor() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById("scoreText").innerHTML = "Yield: " + yieldScore;
            drawField();
            drawTractor();

            if (nightFadeProgress >= 0.0)
                DrawNight();
        }


        function getDirectionName(angle) {
            const normalizedAngle = ((angle % 360) + 450) % 360;
            if (normalizedAngle === 0) return "Right →";
            if (normalizedAngle === 90) return "Down ↓";
            if (normalizedAngle === 180) return "Left ←";
            if (normalizedAngle === 270) return "Up ↑";
            return `${normalizedAngle}°`;
        }

        // moveForward function that moves over time
        function moveForward(duration) {
            return new Promise((resolve) => {
                const startTime = Date.now();
                const endTime = startTime + (duration * 1000);

                const moveX = SPEED * Math.cos(angle * Math.PI / 180);
                const moveY = SPEED * Math.sin(angle * Math.PI / 180);

                function animate() {
                    const currentTime = Date.now();
                    const elapsed = (currentTime - startTime) / 1000;

                    if (currentTime < endTime && isMoving) {
                        // Calculate how much to move based on frame time
                        const deltaTime = 1 / 60; // assuming 60fps

                        tractorWorldX += moveX * deltaTime;
                        tractorWorldY += moveY * deltaTime;

                        cameraX = tractorWorldX - tractorScreenX;
                        cameraY = tractorWorldY - tractorScreenY;

                        drawFieldAndTractor();
                        animationId = requestAnimationFrame(animate);
                    } else {
                        resolve();
                    }
                }

                animate();
            });
        }

    	function turnLeft() {
        	goalAngle -= 90;
        	return OnNewGoalRotation();
    	}

    	function turnRight() {
        	goalAngle += 90;
        	return OnNewGoalRotation();
    	}

    	function TurnXLeft(amount) {
        	goalAngle -= amount;
        	return OnNewGoalRotation();
    	}

    	function TurnXRight(amount) {
        	goalAngle += amount;
        	return OnNewGoalRotation();
    	}

    	function OnNewGoalRotation() {
        	return new Promise((resolve) => {
           	 
            	function turn() {
                    const delta = 1 / 60; // assuming 60fps
               	 
                	if (angle != goalAngle) {
                        // For the actual turning.
                    	var difference = (goalAngle - angle);
                        var absDiff = Math.abs(difference);
                        var alpha = Math.min(turnSpeed*delta, absDiff) / absDiff;
                    	angle = angle*(1 - alpha) + goalAngle*alpha;

                        // // Move the tractor while turning, to look more natural.
                        const moveX = SPEED * Math.cos(angle * Math.PI / 180);
                        const moveY = SPEED * Math.sin(angle * Math.PI / 180);
                        tractorWorldX += moveX * delta;
                        tractorWorldY += moveY * delta;

                        cameraX = tractorWorldX - tractorScreenX;
                        cameraY = tractorWorldY - tractorScreenY;

                    	drawFieldAndTractor();
                    	animationId = requestAnimationFrame(turn);
                	} else {
                    	resolve();
                	}
            	}
            	turn();
        	});
    	}

        function DoNightTransition() {
        	return new Promise((resolve) => {
           	    nightFadeProgress = 0.0;

            	function UpdateNight() {
                    const delta = 1 / 60; // assuming 60fps
                    let prev = nightFadeProgress;
                    nightFadeProgress = Math.min(nightFadeProgress + delta, 1.0);
                    console.log("Progress:" + nightFadeProgress);
               	 
                	if (nightFadeProgress < 1.0) {
                        if (prev < 0.5 && nightFadeProgress >= 0.5) {
                            // ADD: function call to grow crops here, as the night reaches its peak.
                        }

                    	drawFieldAndTractor();
                    	animationId = requestAnimationFrame(UpdateNight);
                	} else {
                        nightFadeProgress = -1;
                    	resolve();
                	}
            	}
            	UpdateNight();
        	});
        }

        function resetPosition() {
            if (!isInitialized) return;

            tractorWorldX = (columns * tileWidth) / 2;
            tractorWorldY = (rows * tileHeight) / 2;
            angle = 0;

            cameraX = tractorWorldX - tractorScreenX;
            cameraY = tractorWorldY - tractorScreenY;

            goalAngle = 0;
            isHarvestingOn = false;
            isSeedingOn = false;
            isTractorOn = false;
            yieldScore = 0;
            resetField();
            drawFieldAndTractor();
        }

        function stopMovement() {
            isMoving = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = -1;
            }
        }

        // Initial draw
        // if (imageLoadCount === imageCount) drawFieldAndTractor();

        // Run button - now uses async/await
        document.getElementById('runButton').addEventListener('click', async function () {
            const runButton = document.getElementById('runButton');
            runButton.disabled = true;

            isMoving = true;

            const allBlocks = workspace.getAllBlocks(false);

            if (allBlocks.length > 0) {
                const code = Blockly.JavaScript.workspaceToCode(workspace);

                if (code.trim()) {
                    try {
                        // Wrap the code in an async function and execute
                        const asyncCode = `(async function() { ${code} })()`;
                        await eval(asyncCode);
                    } catch (e) {
                        console.error('ERROR:', e);
                    }
                }
            }
            isMoving = false;
            runButton.disabled = false;
        });

        // Stop button
        document.getElementById('stopButton').addEventListener('click', function () {
            stopMovement();
            runButton.disabled = false;
        });

        // Reset button
        document.getElementById('resetButton').addEventListener('click', function () {
            stopMovement();
            resetPosition();
            runButton.disabled = false;
        });
    </script>
</body>
</html>
